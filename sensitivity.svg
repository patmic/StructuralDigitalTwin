<svg width="860" height="320" viewBox="0 0 860 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#060d1f"/>
    </linearGradient>
  </defs>
  <rect width="860" height="320" rx="10" fill="url(#bg)" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Title -->
  <text x="430" y="24" text-anchor="middle" font-family="monospace" font-size="12" fill="#e2e8f0" font-weight="bold">
    Sensitivity Analysis — Monotonicity Verification (Theorem 1.2)
  </text>
  <text x="430" y="40" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#475569">
    score_Δ(d) as missing maltg_ref services are progressively added to the Digital Twin
  </text>

  <!-- Axes -->
  <!-- Y axis: 30–100 mapped to y=260→50  (range 70px per 70pts → 1px per pt) → actually y=260 - (val-30)*3 -->
  <!-- X axis: 0–6 steps, x = 100 + step*110 -->
  <line x1="90"  y1="50"  x2="90"  y2="270" stroke="#374151" stroke-width="1"/>
  <line x1="90"  y1="270" x2="770" y2="270" stroke="#374151" stroke-width="1"/>

  <!-- Y grid + labels  (30,40,50,60,70,80,90,100) -->
  <!-- y_pos = 260 - (val - 30) * (220/70) = 260 - (val-30)*3.14 -->
  <line x1="90" y1="260" x2="770" y2="260" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="82" y="264" text-anchor="end" font-family="monospace" font-size="8" fill="#475569">30</text>
  <line x1="90" y1="229" x2="770" y2="229" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="82" y="233" text-anchor="end" font-family="monospace" font-size="8" fill="#475569">40</text>
  <line x1="90" y1="197" x2="770" y2="197" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="82" y="201" text-anchor="end" font-family="monospace" font-size="8" fill="#475569">50</text>
  <line x1="90" y1="166" x2="770" y2="166" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="82" y="170" text-anchor="end" font-family="monospace" font-size="8" fill="#475569">60</text>
  <line x1="90" y1="134" x2="770" y2="134" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="82" y="138" text-anchor="end" font-family="monospace" font-size="8" fill="#475569">70</text>
  <line x1="90" y1="103" x2="770" y2="103" stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="82" y="107" text-anchor="end" font-family="monospace" font-size="8" fill="#475569">80</text>
  <line x1="90" y1="72"  x2="770" y2="72"  stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="82" y="76"  text-anchor="end" font-family="monospace" font-size="8" fill="#475569">90</text>
  <line x1="90" y1="40"  x2="770" y2="40"  stroke="#1e3a5f" stroke-width="0.5"/>
  <text x="82" y="44"  text-anchor="end" font-family="monospace" font-size="8" fill="#475569">100</text>

  <!-- Y axis label -->
  <text x="20" y="160" text-anchor="middle" font-family="monospace" font-size="9" fill="#475569" transform="rotate(-90,20,160)">score_Δ (0–100)</text>

  <!-- X tick labels -->
  <!-- x_pos = 100 + step*110  -->
  <text x="100" y="284" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#475569">0</text>
  <text x="210" y="284" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#475569">+1</text>
  <text x="320" y="284" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#475569">+2</text>
  <text x="430" y="284" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#475569">+3</text>
  <text x="540" y="284" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#475569">+4</text>
  <text x="650" y="284" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#475569">+5</text>
  <text x="760" y="284" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#475569">+6</text>
  <text x="430" y="300" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#475569">Additional maltg_ref services added to Digital Twin Δ</text>

  <!-- ─── LegalTech line  41.5 47.3 53.1 58.9 64.7 66.1 69.1 ─── -->
  <!-- y = 260 - (val - 30) * 3.14 -->
  <!-- 41.5 → 260-35.8=224  47.3→260-54.1=206  53.1→260-72.3=188  58.9→260-90.6=169 -->
  <!-- 64.7→260-108.9=151  66.1→260-113.3=147  69.1→260-122.6=137 -->
  <polyline points="100,224 210,206 320,188 430,169 540,151 650,147 760,137"
    fill="none" stroke="#60a5fa" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- dots -->
  <circle cx="100" cy="224" r="4.5" fill="#60a5fa"/>
  <circle cx="210" cy="206" r="4.5" fill="#60a5fa"/>
  <circle cx="320" cy="188" r="4.5" fill="#60a5fa"/>
  <circle cx="430" cy="169" r="4.5" fill="#60a5fa"/>
  <circle cx="540" cy="151" r="4.5" fill="#60a5fa"/>
  <circle cx="650" cy="147" r="4.5" fill="#60a5fa"/>
  <circle cx="760" cy="137" r="4.5" fill="#60a5fa"/>
  <!-- value labels -->
  <text x="100" cy="224" y="218" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#60a5fa">41.5</text>
  <text x="760" cy="137" y="131" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#60a5fa">69.1</text>

  <!-- ─── TOGAF line  64.2 67.8 72.5 78.1 83.6 88.9 91.7 ─── -->
  <!-- 64.2→260-107.4=153  67.8→260-118.6=141  72.5→260-133.4=127  78.1→260-150.9=109 -->
  <!-- 83.6→260-168.2=92  88.9→260-184.8=75  91.7→260-193.6=66 -->
  <polyline points="100,153 210,141 320,127 430,109 540,92 650,75 760,66"
    fill="none" stroke="#00e5ff" stroke-width="2.2" stroke-dasharray="6,3" stroke-linejoin="round"/>
  <circle cx="100" cy="153" r="4" fill="#00e5ff"/>
  <circle cx="210" cy="141" r="4" fill="#00e5ff"/>
  <circle cx="320" cy="127" r="4" fill="#00e5ff"/>
  <circle cx="430" cy="109" r="4" fill="#00e5ff"/>
  <circle cx="540" cy="92"  r="4" fill="#00e5ff"/>
  <circle cx="650" cy="75"  r="4" fill="#00e5ff"/>
  <circle cx="760" cy="66"  r="4" fill="#00e5ff"/>
  <text x="100" y="147" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#00e5ff">64.2</text>
  <text x="760" y="60"  text-anchor="middle" font-family="monospace" font-size="7.5" fill="#00e5ff">91.7</text>

  <!-- ─── AI line  74.1 76.9 80.4 83.7 85.9 87.2 87.2 ─── -->
  <!-- 74.1→260-138.5=121  76.9→260-147.3=113  80.4→260-158.3=102  83.7→260-168.8=91 -->
  <!-- 85.9→260-175.7=84  87.2→260-179.8=80  87.2→80 -->
  <polyline points="100,121 210,113 320,102 430,91 540,84 650,80 760,80"
    fill="none" stroke="#a855f7" stroke-width="2.2" stroke-dasharray="2,3" stroke-linejoin="round"/>
  <circle cx="100" cy="121" r="4" fill="#a855f7"/>
  <circle cx="210" cy="113" r="4" fill="#a855f7"/>
  <circle cx="320" cy="102" r="4" fill="#a855f7"/>
  <circle cx="430" cy="91"  r="4" fill="#a855f7"/>
  <circle cx="540" cy="84"  r="4" fill="#a855f7"/>
  <circle cx="650" cy="80"  r="4" fill="#a855f7"/>
  <circle cx="760" cy="80"  r="4" fill="#a855f7"/>
  <text x="100" y="115" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#a855f7">74.1</text>
  <text x="760" y="74"  text-anchor="middle" font-family="monospace" font-size="7.5" fill="#a855f7">87.2</text>

  <!-- ─── Full-coverage reference line at 100 ─── -->
  <line x1="90" y1="40" x2="770" y2="40" stroke="#22c55e" stroke-width="0.8" stroke-dasharray="8,4" opacity="0.4"/>
  <text x="775" y="44" font-family="monospace" font-size="7.5" fill="#22c55e" opacity="0.6">Ψ=1.0</text>

  <!-- ─── Legend ─── -->
  <line x1="110" y1="306" x2="140" y2="306" stroke="#60a5fa" stroke-width="2"/>
  <circle cx="125" cy="306" r="3.5" fill="#60a5fa"/>
  <text x="148" y="310" font-family="monospace" font-size="8.5" fill="#94a3b8">LegalTech d₉  (Ψ: 60%→100%)</text>

  <line x1="330" y1="306" x2="360" y2="306" stroke="#00e5ff" stroke-width="2" stroke-dasharray="6,3"/>
  <circle cx="345" cy="306" r="3.5" fill="#00e5ff"/>
  <text x="368" y="310" font-family="monospace" font-size="8.5" fill="#94a3b8">TOGAF d₁  (Ψ: 70%→100%)</text>

  <line x1="560" y1="306" x2="590" y2="306" stroke="#a855f7" stroke-width="2" stroke-dasharray="2,3"/>
  <circle cx="575" cy="306" r="3.5" fill="#a855f7"/>
  <text x="598" y="310" font-family="monospace" font-size="8.5" fill="#94a3b8">AI d₄  (Ψ: 85%→100%)</text>
</svg>
