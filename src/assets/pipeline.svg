<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 220" width="1200" height="220">
  <defs>
    <style>
      @keyframes phase-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
      @keyframes arrow-draw { from{stroke-dashoffset:40} to{stroke-dashoffset:0} }
      @keyframes ldcc-pulse { 0%,100%{filter:drop-shadow(0 0 6px #60a5fa66)} 50%{filter:drop-shadow(0 0 14px #60a5facc)} }
      .p1{animation:phase-in .6s ease .1s both}
      .p2{animation:phase-in .6s ease .25s both}
      .p3{animation:phase-in .6s ease .4s both}
      .p4{animation:phase-in .6s ease .55s both; animation-name:phase-in,ldcc-pulse; animation-duration:.6s,3s; animation-delay:.55s,.8s; animation-timing-function:ease,ease-in-out; animation-fill-mode:both,none; animation-iteration-count:1,infinite}
      .p5{animation:phase-in .6s ease .7s both}
      .arr{stroke-dasharray:40;animation:arrow-draw .4s ease forwards}
      .a1{animation-delay:.22s}
      .a2{animation-delay:.37s}
      .a3{animation-delay:.52s}
      .a4{animation-delay:.67s}
    </style>
    <linearGradient id="pipe-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#070c1a"/>
      <stop offset="100%" stop-color="#050810"/>
    </linearGradient>
    <linearGradient id="ldcc-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#60a5fa" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity=".05"/>
    </linearGradient>
    <marker id="arr-head" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,1 L7,4 L0,7 Z" fill="#1a2744"/>
    </marker>
    <pattern id="pipe-grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0L0 0 0 40" fill="none" stroke="#00e5ff" stroke-width=".3" opacity=".05"/>
    </pattern>
  </defs>

  <rect width="1200" height="220" fill="url(#pipe-bg)"/>
  <rect width="1200" height="220" fill="url(#pipe-grid)"/>

  <!-- Section label -->
  <text x="600" y="24" text-anchor="middle"
    font-family="'Courier New',monospace" font-size="11" fill="#3d4f6e" letter-spacing="3">
    MALTG VALIDATION METHODOLOGY  ·  5-PHASE PIPELINE
  </text>
  <line x1="100" y1="30" x2="1100" y2="30" stroke="#1a2744" stroke-width=".8"/>

  <!-- Phase data:  id · abbrev · name · color · x -->
  <!-- P1 ORE -->
  <g class="p1" transform="translate(60,55)">
    <rect width="170" height="118" rx="8" fill="#0d1525" stroke="#00e5ff" stroke-width="1.4"/>
    <rect width="170" height="4" rx="8" fill="#00e5ff" opacity=".8"/>
    <text x="85" y="26" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="800" fill="#00e5ff" letter-spacing="1">P1</text>
    <text x="85" y="42" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#00e5ff" letter-spacing="1">ORE</text>
    <text x="85" y="57" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" fill="#e8f0ff">Ontological Reference</text>
    <text x="85" y="70" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" fill="#e8f0ff">Elicitation</text>
    <line x1="15" y1="82" x2="155" y2="82" stroke="#1a2744" stroke-width=".8"/>
    <text x="10" y="94" font-family="'Courier New',monospace" font-size="8" fill="#3d4f6e">IN:</text>
    <text x="28" y="94" font-family="'Courier New',monospace" font-size="8" fill="#7a8db0">MALTG_onto.owl</text>
    <text x="10" y="107" font-family="'Courier New',monospace" font-size="8" fill="#3d4f6e">OUT:</text>
    <text x="30" y="107" font-family="'Courier New',monospace" font-size="8" fill="#00e5ff">Ω, score_Ω(d)</text>
  </g>

  <!-- Arrow 1 -->
  <line class="arr a1" x1="234" y1="114" x2="268" y2="114"
    stroke="#1a2744" stroke-width="2" marker-end="url(#arr-head)"/>

  <!-- P2 DTSM -->
  <g class="p2" transform="translate(272,55)">
    <rect width="170" height="118" rx="8" fill="#0d1525" stroke="#a855f7" stroke-width="1.4"/>
    <rect width="170" height="4" rx="8" fill="#a855f7" opacity=".8"/>
    <text x="85" y="26" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="800" fill="#a855f7" letter-spacing="1">P2</text>
    <text x="85" y="42" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#a855f7" letter-spacing="1">DTSM</text>
    <text x="85" y="57" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" fill="#e8f0ff">Digital Twin</text>
    <text x="85" y="70" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" fill="#e8f0ff">Structural Mapping</text>
    <line x1="15" y1="82" x2="155" y2="82" stroke="#1a2744" stroke-width=".8"/>
    <text x="10" y="94" font-family="'Courier New',monospace" font-size="8" fill="#3d4f6e">IN:</text>
    <text x="28" y="94" font-family="'Courier New',monospace" font-size="8" fill="#7a8db0">dt_arch.json</text>
    <text x="10" y="107" font-family="'Courier New',monospace" font-size="8" fill="#3d4f6e">OUT:</text>
    <text x="30" y="107" font-family="'Courier New',monospace" font-size="8" fill="#a855f7">Δ, R, Γ: C → 2^V</text>
  </g>

  <!-- Arrow 2 -->
  <line class="arr a2" x1="446" y1="114" x2="480" y2="114"
    stroke="#1a2744" stroke-width="2" marker-end="url(#arr-head)"/>

  <!-- P3 HCS -->
  <g class="p3" transform="translate(484,55)">
    <rect width="170" height="118" rx="8" fill="#0d1525" stroke="#10e98c" stroke-width="1.4"/>
    <rect width="170" height="4" rx="8" fill="#10e98c" opacity=".8"/>
    <text x="85" y="26" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="800" fill="#10e98c" letter-spacing="1">P3</text>
    <text x="85" y="42" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#10e98c" letter-spacing="1">HCS</text>
    <text x="85" y="57" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" fill="#e8f0ff">Hierarchical</text>
    <text x="85" y="70" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" fill="#e8f0ff">Conformance Scoring</text>
    <line x1="15" y1="82" x2="155" y2="82" stroke="#1a2744" stroke-width=".8"/>
    <text x="10" y="94" font-family="'Courier New',monospace" font-size="8" fill="#3d4f6e">Ψ(d) =</text>
    <text x="48" y="94" font-family="'Courier New',monospace" font-size="8" fill="#7a8db0">0.4·root + 0.6·subs</text>
    <text x="10" y="107" font-family="'Courier New',monospace" font-size="8" fill="#3d4f6e">OUT:</text>
    <text x="30" y="107" font-family="'Courier New',monospace" font-size="8" fill="#10e98c">Ψ(d), δ(d), scores</text>
  </g>

  <!-- Arrow 3 -->
  <line class="arr a3" x1="658" y1="114" x2="692" y2="114"
    stroke="#1a2744" stroke-width="2" marker-end="url(#arr-head)"/>

  <!-- P4 LDCC (LegalTech — highlighted) -->
  <g class="p4" transform="translate(696,45)">
    <rect width="180" height="136" rx="8" fill="url(#ldcc-grad)" stroke="#60a5fa" stroke-width="2"/>
    <rect width="180" height="4"   rx="8" fill="#60a5fa"/>
    <!-- NEW badge -->
    <rect x="118" y="10" width="50" height="16" rx="3" fill="#60a5fa" opacity=".15"/>
    <rect x="118" y="10" width="50" height="16" rx="3" fill="none" stroke="#60a5fa" stroke-width=".8" opacity=".6"/>
    <text x="143" y="22" text-anchor="middle" font-family="'Courier New',monospace" font-size="9" fill="#60a5fa" font-weight="700">◄ NEW</text>

    <text x="90" y="30" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="14" font-weight="800" fill="#60a5fa" letter-spacing="1">P4</text>
    <text x="90" y="47" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#60a5fa" letter-spacing="1">LDCC</text>
    <text x="90" y="63" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" fill="#e8f0ff">LegalTech Domain</text>
    <text x="90" y="76" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" fill="#e8f0ff">Compliance Check</text>
    <line x1="15" y1="90" x2="165" y2="90" stroke="#1a2744" stroke-width=".8"/>
    <text x="10" y="103" font-family="'Courier New',monospace" font-size="8" fill="#3d4f6e">IN:</text>
    <text x="28" y="103" font-family="'Courier New',monospace" font-size="8" fill="#7a8db0">LegalTech cluster</text>
    <text x="10" y="116" font-family="'Courier New',monospace" font-size="8" fill="#3d4f6e">REG:</text>
    <text x="34" y="116" font-family="'Courier New',monospace" font-size="8" fill="#60a5fa">GDPR·eIDAS·NIS2</text>
    <text x="10" y="129" font-family="'Courier New',monospace" font-size="8" fill="#3d4f6e">OUT:</text>
    <text x="30" y="129" font-family="'Courier New',monospace" font-size="8" fill="#60a5fa">LT coverage map</text>
  </g>

  <!-- Arrow 4 -->
  <line class="arr a4" x1="880" y1="114" x2="914" y2="114"
    stroke="#1a2744" stroke-width="2" marker-end="url(#arr-head)"/>

  <!-- P5 MDGA -->
  <g class="p5" transform="translate(918,55)">
    <rect width="170" height="118" rx="8" fill="#0d1525" stroke="#ffc947" stroke-width="1.4"/>
    <rect width="170" height="4" rx="8" fill="#ffc947" opacity=".8"/>
    <text x="85" y="26" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="800" fill="#ffc947" letter-spacing="1">P5</text>
    <text x="85" y="42" text-anchor="middle" font-family="'Courier New',monospace" font-size="11" font-weight="700" fill="#ffc947" letter-spacing="1">MDGA</text>
    <text x="85" y="57" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" fill="#e8f0ff">Multi-Dimensional</text>
    <text x="85" y="70" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="9.5" fill="#e8f0ff">Gap Analysis</text>
    <line x1="15" y1="82" x2="155" y2="82" stroke="#1a2744" stroke-width=".8"/>
    <text x="10" y="94" font-family="'Courier New',monospace" font-size="8" fill="#3d4f6e">IN:</text>
    <text x="28" y="94" font-family="'Courier New',monospace" font-size="8" fill="#7a8db0">All δ(d) from P3+P4</text>
    <text x="10" y="107" font-family="'Courier New',monospace" font-size="8" fill="#3d4f6e">OUT:</text>
    <text x="30" y="107" font-family="'Courier New',monospace" font-size="8" fill="#ffc947">Radar · GAP rank</text>
  </g>

  <!-- Formal model footer -->
  <text x="600" y="196" text-anchor="middle"
    font-family="'Courier New',monospace" font-size="12" fill="#3d4f6e">
    MALTG = ⟨Ω, Δ, Γ, Ψ, δ⟩  ·  Ψ(d) = 0.4·𝟙[root∈R] + 0.6·(|sub_d∩R|/|sub_d|)  ·  δ(d) = score_Ω(d)·(1−Ψ(d))
  </text>

  <!-- Bottom line -->
  <rect x="0" y="213" width="1200" height="2" rx="1" fill="url(#bottom-line)" opacity=".5"/>
</svg>
