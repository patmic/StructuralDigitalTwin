<svg width="900" height="140" viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060d1f"/>
      <stop offset="50%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#060d1f"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="45%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="sweepG" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00e5ff" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#00e5ff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="140" rx="14" fill="url(#bgGrad)"/>

  <!-- Grid lines horizontal -->
  <line x1="0" y1="35"  x2="900" y2="35"  stroke="#1e3a5f" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="105" x2="900" y2="105" stroke="#1e3a5f" stroke-width="0.5" opacity="0.4"/>
  <!-- Grid lines vertical -->
  <line x1="160" y1="0" x2="160" y2="140" stroke="#1e3a5f" stroke-width="0.5" opacity="0.25"/>
  <line x1="740" y1="0" x2="740" y2="140" stroke="#1e3a5f" stroke-width="0.5" opacity="0.25"/>

  <!-- Hexagon left -->
  <polygon points="32,18 54,18 65,36 54,54 32,54 21,36"
    fill="none" stroke="#00e5ff" stroke-width="1.2" opacity="0.35"/>
  <circle cx="32" cy="36" r="2.5" fill="#00e5ff" opacity="0.7"/>
  <circle cx="65" cy="36" r="2.5" fill="#00e5ff" opacity="0.5"/>
  <!-- Hexagon right -->
  <polygon points="848,84 870,84 881,102 870,120 848,120 837,102"
    fill="none" stroke="#a855f7" stroke-width="1.2" opacity="0.35"/>
  <circle cx="881" cy="102" r="2.5" fill="#a855f7" opacity="0.7"/>

  <!-- Corner dots -->
  <circle cx="20" cy="20" r="2" fill="#1e3a5f" opacity="0.6"/>
  <circle cx="880" cy="20" r="2" fill="#1e3a5f" opacity="0.6"/>
  <circle cx="20" cy="120" r="2" fill="#1e3a5f" opacity="0.6"/>
  <circle cx="880" cy="120" r="2" fill="#1e3a5f" opacity="0.6"/>

  <!-- Animated sweep -->
  <rect y="0" width="280" height="140" rx="14" fill="url(#sweepG)" opacity="0.12">
    <animate attributeName="x" from="-280" to="900" dur="4s" repeatCount="indefinite" calcMode="linear"/>
  </rect>

  <!-- Title lines -->
  <text x="450" y="48" text-anchor="middle"
    font-family="'Courier New', Courier, monospace" font-size="14" font-weight="bold"
    fill="url(#titleGrad)" filter="url(#glow)" letter-spacing="1">
    STRUCTURAL DIGITAL TWIN–DRIVEN VALIDATION
  </text>
  <text x="450" y="72" text-anchor="middle"
    font-family="'Courier New', Courier, monospace" font-size="14" font-weight="bold"
    fill="url(#titleGrad)" filter="url(#glow)" letter-spacing="1">
    FOR A MULTIDIMENSIONAL LEGALTECH
  </text>
  <text x="450" y="96" text-anchor="middle"
    font-family="'Courier New', Courier, monospace" font-size="14" font-weight="bold"
    fill="url(#titleGrad)" filter="url(#glow)" letter-spacing="1">
    GOVERNANCE ARCHITECTURE ONTOLOGY
  </text>

  <!-- Version pill -->
  <rect x="350" y="112" width="200" height="18" rx="9" fill="#0f1f3d"/>
  <text x="450" y="124" text-anchor="middle"
    font-family="'Courier New', Courier, monospace" font-size="9" fill="#00e5ff" letter-spacing="0.5">
    ⬢  MALTG v3.0  ·  OWL 2  ·  Q1 Target
  </text>
</svg>
